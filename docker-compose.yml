version: '3.8'

services:
  backend:
    build: ./backend
    container_name: plimsoll-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/server.log:/app/server.log
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: plimsoll-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
