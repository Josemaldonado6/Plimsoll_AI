name: Plimsoll AI - Production Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # JOB 1: Build del frontend (React/Vite PWA)
  # -----------------------------------------------------------------------
  build-frontend:
    name: Build Frontend PWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build PWA
        run: npm run build
        working-directory: frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # -----------------------------------------------------------------------
  # JOB 2: Deploy backend a Vercel (Cloud API — sin OpenVINO)
  #
  # Secrets requeridos en GitHub → Settings → Secrets → Actions:
  #   VERCEL_TOKEN      — Token de Vercel (vercel.com/account/tokens)
  #   VERCEL_ORG_ID     — ID de organización (vercel.com/account → settings)
  #   VERCEL_PROJECT_ID — ID del proyecto  (vercel project settings)
  # -----------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend → Vercel
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build on Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # -----------------------------------------------------------------------
  # JOB 3: Smoke test post-deploy
  # -----------------------------------------------------------------------
  smoke-test:
    name: Smoke Test — /api/health
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.VERCEL_PROJECT_URL }}/api/health")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED — expected 200, got $STATUS"
            exit 1
          fi
          echo "Smoke test PASSED"
