version: '3.8'

services:
  backend:
    build: ./backend
    container_name: plimsoll_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    restart: always

  frontend:
    build: ./frontend
    container_name: plimsoll_ui
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  plimsoll_data:
